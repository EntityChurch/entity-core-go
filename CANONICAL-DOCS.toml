[project]
name   = "Entity Core Go"
slug   = "entity-core-go"
repo   = "entity-core-go"
github = "https://github.com/EntityChurch/entity-core-go"
intro  = """
The Go reference implementation of Entity Core Protocol v7, and the interop
oracle the Rust and Python implementations validate against. It sits in the
"reference implementation" layer of the stack: it depends on the protocol
specification (entity-core-architecture) and is depended on by binding/app
repos (notably entity-workbench-go, which pins this module at v0.8.0). It is a
solid, exercised implementation — the conformance suite runs green against it
and it serves as the cohort baseline. Build is make + podman only (no host Go
required); a fresh clone builds and tests standalone.

Headline command-line tools (all under cmd/, built by `make build`):
- entity-peer    — run a protocol peer (the server).
- validate-peer  — conformance validator; runs the spec test suite against any
                   peer, single- or multi-peer (`--profile core` for the core
                   profile). This is the tool that produces the conformance
                   signal.
- peer-manager   — start/stop/list Go, Rust, and Python peers for interop runs.
- entity-sync    — set up cross-peer sync (continuations + subscriptions).
The `make` targets (`build`, `test`, `vet`, `race`, `validate*`) are the
supported entry points; see README.md.
"""

